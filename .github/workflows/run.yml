name: X AI Score

on:
  schedule:
    # 毎週金曜 21:00 JST → UTC 12:00
    - cron: "0 12 * * FRI"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # リポジトリチェックアウト
      - uses: actions/checkout@v4

      # Pythonセットアップ
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 依存ライブラリインストール
      - run: pip install xai-sdk markdown --quiet

      # レポート生成
      - run: python main.py
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      # 結果をコミット・プッシュ
      - run: |
          git config --global user.name "ai-score-bot"
          git config --global user.email "265550930+yuama-dot@users.noreply.github.com"
          git add report_*.md
          git commit -m "weekly AI score report $(date '+%Y%m%d_%H%M')" || exit 0
          git push
